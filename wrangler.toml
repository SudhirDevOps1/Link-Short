name = "link-short"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Import HTML as text module for the embedded dashboard
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

# Custom domain / workers.dev routes are configured after deploy.
# workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "url-shortener-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
migrations_dir = "migrations"

[vars]
# Public site origin used when building short_url values in API responses
APP_URL = "https://example.com"
# Default redirect type when not specified on create (301 or 302)
DEFAULT_REDIRECT = "302"
# Set to "true" to require API_KEY for /api/* routes
REQUIRE_API_KEY = "false"

# Secrets (set via `wrangler secret put API_KEY`):
# API_KEY = "your-secret-api-key"
