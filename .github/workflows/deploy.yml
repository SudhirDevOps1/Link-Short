name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: cloudflare/package.json

      - name: Install Dependencies
        run: |
          cd cloudflare
          npm install

      - name: Auto-setup D1 Database and Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
          API_KEY: ${{ secrets.API_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          DEFAULT_REDIRECT: ${{ secrets.DEFAULT_REDIRECT }}
          REQUIRE_API_KEY: ${{ secrets.REQUIRE_API_KEY }}
        run: |
          cd cloudflare
          
          # Set database name (default to 'link-short-db' to avoid conflicts with old ones)
          DB_NAME="$D1_DATABASE_NAME"
          if [ -z "$DB_NAME" ]; then
            DB_NAME="link-short-db"
          fi
          echo "Using Database Name: $DB_NAME"
          
          # Replace database_name in wrangler.toml
          sed -i "s/database_name = .*/database_name = \"$DB_NAME\"/g" wrangler.toml

          echo "Checking/Creating D1 Database..."
          # Try to get database ID if it already exists
          DB_ID=$(npx wrangler d1 list --json | jq -r --arg DB_NAME "$DB_NAME" '.[] | select(.name==$DB_NAME) | .uuid' 2>/dev/null || true)
          
          if [ -z "$DB_ID" ]; then
            echo "Database '$DB_NAME' not found. Creating a new D1 database..."
            # Create database and extract ID
            DB_ID=$(npx wrangler d1 create "$DB_NAME" --json | jq -r '.database_id')
            echo "Created D1 database with ID: $DB_ID"
          else
            echo "Found existing D1 database with ID: $DB_ID"
          fi
          
          # Replace REPLACE_WITH_YOUR_D1_DATABASE_ID in wrangler.toml
          sed -i "s/database_id = .*/database_id = \"$DB_ID\"/g" wrangler.toml
          
          echo "Applying migrations to D1 Database..."
          npx wrangler d1 migrations apply "$DB_NAME" --remote --yes
          
          # Inject/Configure public variables in wrangler.toml if provided
          if [ ! -z "$APP_URL" ]; then
            sed -i "s|APP_URL = .*|APP_URL = \"$APP_URL\"|g" wrangler.toml
          fi
          if [ ! -z "$DEFAULT_REDIRECT" ]; then
            sed -i "s|DEFAULT_REDIRECT = .*|DEFAULT_REDIRECT = \"$DEFAULT_REDIRECT\"|g" wrangler.toml
          fi
          if [ ! -z "$REQUIRE_API_KEY" ]; then
            sed -i "s|REQUIRE_API_KEY = .*|REQUIRE_API_KEY = \"$REQUIRE_API_KEY\"|g" wrangler.toml
          fi

          # Upload API_KEY secret to Cloudflare if set
          if [ ! -z "$API_KEY" ]; then
            echo "Uploading API_KEY secret..."
            echo "$API_KEY" | npx wrangler secret put API_KEY
          fi
          
          echo "Deploying Worker..."
          npx wrangler deploy

